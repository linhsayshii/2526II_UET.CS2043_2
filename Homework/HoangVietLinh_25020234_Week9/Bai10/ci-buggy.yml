# ĐÂY LÀ FILE CÓ LỖI (TRƯỚC KHI SỬA) - Xem file ci.yml cho bản đã sửa
# LỖI 1: THIẾU bước checkout code

name: Java CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # THIẾU: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package
